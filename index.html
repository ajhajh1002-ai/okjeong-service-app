<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>양주옥정회중 3집단 봉사기록</title>

<style>
body {font-family: sans-serif; background:#f5f5f5; padding:15px;}
.card {background:white; padding:15px; border-radius:10px; margin-bottom:15px;}
button {padding:10px; margin:5px; border:none; border-radius:6px;}
.black {background:black; color:white;}
.gray {background:#ddd;}
.input {width:100%; padding:8px; margin:5px 0;}
.nameBtn {display:block; width:100%; padding:10px; margin:5px 0; border-radius:8px;}
.done {background:black; color:white;}
</style>
</head>

<body>

<h2>양주옥정회중 3집단 봉사기록</h2>

<div class="card">
<h3>월별 입력</h3>

<input id="month" class="input" placeholder="예: 2026-03"/>

<div id="members"></div>

<button class="black" onclick="saveAll()">저장</button>
</div>

<div class="card">
<h3>집단보고</h3>
<pre id="report"></pre>
<button class="black" onclick="copyReport()">복사</button>
</div>

<div class="card">
<h3>백업 / 복원</h3>
<button class="black" onclick="backup()">백업</button>
<input type="file" onchange="restore(event)">
</div>

<script>

const memberList = [
"엄미자","김영윤","임혁","최수림","안영옥",
"강언용","이명희","안진호","고다롱","박명철",
"김솔","김광태","김하윤","이동국","김금선","최성남"
];

let data = JSON.parse(localStorage.getItem('service')||'{}');

function render(){
  const div = document.getElementById('members');
  div.innerHTML = '';

  memberList.forEach(name=>{
    const btn = document.createElement('button');
    btn.innerText = name;
    btn.className = 'nameBtn ' + (data[name] ? 'done':'gray');
    btn.onclick = ()=>{
      const time = prompt(name+" 시간 입력");
      const note = prompt(name+" 비고 입력","");
      data[name] = {time,note};
      render();
    };
    div.appendChild(btn);
  });

  makeReport();
}

function saveAll(){
  localStorage.setItem('service', JSON.stringify(data));
  alert('저장 완료');
}

function makeReport(){
  let txt = '';
  Object.keys(data).forEach(n=>{
    const d = data[n];
    txt += `${n} 시간:${d.time||'-'} 비고:${d.note||''}\n`;
  });
  document.getElementById('report').innerText = txt;
}

function copyReport(){
  navigator.clipboard.writeText(document.getElementById('report').innerText);
  alert('복사 완료');
}

function backup(){
  const blob = new Blob([JSON.stringify(data)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'backup.json';
  a.click();
}

function restore(e){
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = ()=>{
    data = JSON.parse(reader.result);
    localStorage.setItem('service', JSON.stringify(data));
    render();
  };
  reader.readAsText(file);
}

render();

</script>

</body>
</html>
