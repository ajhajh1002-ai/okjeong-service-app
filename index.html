<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>양주옥정회중 3집단 봉사기록</title>

<style>
body{margin:0;font-family:sans-serif;background:#f4f4f4}
.container{padding:12px;max-width:700px;margin:auto}

.card{background:white;border-radius:12px;padding:12px;margin-bottom:10px}
.title{font-weight:bold;margin-bottom:8px}

button{border:none;border-radius:10px;padding:10px;font-size:14px}
.small-btn{padding:8px;font-size:12px}

.black{background:black;color:white}
.gray{background:#ddd}
.green{background:#4CAF50;color:white}
.red{background:#f44336;color:white}
.blue{background:#2196F3;color:white}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}

</style>
</head>

<body>
<div id="app"></div>

<script>

const ID="okjeong";
const PW="6104";

let db=JSON.parse(localStorage.getItem("db")||"{}");

let members=[
"엄미자","김영윤","임혁","최수림","안영옥",
"강언용","이명희","안진호","고다롱","박명철",
"김솔","김광태","김하윤","이동국","김금선","최성남"
];

let pioneers=["엄미자","김영윤","임혁","최수림","안영옥"];
let aux={}; // 월별 보조신청

let login=false;
let month=new Date().toISOString().slice(0,7);
let selected="";
let copy1=false;
let copy2=false;

function save(){localStorage.setItem("db",JSON.stringify(db));}

function getType(name){
if(pioneers.includes(name)) return "정규";
if(aux[month]?.includes(name)) return "보조";
return "전도인";
}

function isDone(name){
let d=db[month]?.[name]||{};
let t=getType(name);
if(t==="전도인") return d.participate;
return d.time;
}

function render(){

if(!login){
app.innerHTML=`
<div class="container">
<div class="card">
<div class="title">로그인</div>
<input id="id" placeholder="아이디"><br><br>
<input id="pw" type="password" placeholder="비밀번호"><br><br>
<button class="black" onclick="doLogin()">로그인</button>
</div>
</div>`;
return;
}

if(!db[month]) db[month]={};
if(!aux[month]) aux[month]=[];

app.innerHTML=`
<div class="container">

<div class="card">
<div class="title">월 선택</div>
<input type="month" value="${month}" onchange="month=this.value;render()">
</div>

<div class="card">
<div class="title">이달의 보조P</div>
<div class="grid">
${members.filter(m=>!pioneers.includes(m)).map(m=>`
<button class="${aux[month].includes(m)?'blue':'gray'} small-btn"
onclick="toggleAux('${m}')">${m}</button>
`).join("")}
</div>
</div>

<div class="card">
<div class="title">월별입력</div>
<div class="grid">
${members.map(m=>`
<button class="${isDone(m)?'black':'gray'} small-btn"
onclick="select('${m}')">
${m}
</button>
`).join("")}
</div>

${selected?drawInput():''}

</div>

<div class="card">
<div class="title">집단보고</div>
<pre>${report()}</pre>
<button class="${copy1?'black':'gray'}" onclick="copyReport()">복사</button>
</div>

<div class="card">
<div class="title">백업 / 복원</div>
<button onclick="backup()">백업</button>
<input type="file" onchange="restore(event)">
</div>

</div>
`;
}

function drawInput(){
let t=getType(selected);
let d=db[month][selected]||{};
return `
<div class="card">
<div class="title">${selected} (${t})</div>

${t==="전도인"?`
<button onclick="setPart('${selected}','O')">참여</button>
<button onclick="setPart('${selected}','X')">미참여</button>
<textarea placeholder="비고" onchange="setNote('${selected}',this.value)">${d.note||''}</textarea>
`:
`
<input placeholder="시간" value="${d.time||''}" onchange="setVal('${selected}','time',this.value)">
<input placeholder="연구" value="${d.study||''}" onchange="setVal('${selected}','study',this.value)">
<textarea placeholder="비고" onchange="setNote('${selected}',this.value)">${d.note||''}</textarea>
`}

<button class="black" onclick="save()">저장</button>
</div>`;
}

function select(n){selected=n;render();}

function toggleAux(n){
if(aux[month].includes(n)) aux[month]=aux[month].filter(x=>x!==n);
else aux[month].push(n);
render();
}

function setVal(n,k,v){
if(!db[month][n]) db[month][n]={};
db[month][n][k]=v;
save();
}

function setPart(n,v){
if(!db[month][n]) db[month][n]={};
db[month][n].participate=v;
save();
}

function setNote(n,v){
if(!db[month][n]) db[month][n]={};
db[month][n].note=v;
save();
}

function report(){
let txt="";
members.forEach(m=>{
let d=db[month][m]||{};
let t=getType(m);

if(t==="전도인"){
txt+=`${m} ${t} ${d.participate||'-'} ${d.note||''}\n`;
}else{
txt+=`${m} ${t} ${d.time||'-'} ${d.study||'-'} ${d.note||''}\n`;
}
});
return txt;
}

function copyReport(){
navigator.clipboard.writeText(report());
copy1=true;
setTimeout(()=>{copy1=false;render()},1500);
render();
}

function backup(){
let blob=new Blob([JSON.stringify(db)],{type:'application/json'});
let a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download="backup.json";
a.click();
}

function restore(e){
let r=new FileReader();
r.onload=()=>{db=JSON.parse(r.result);save();render();}
r.readAsText(e.target.files[0]);
}

function doLogin(){
if(id.value===ID && pw.value===PW){login=true;render();}
else alert("로그인 실패");
}

render();

</script>
</body>
</html>
